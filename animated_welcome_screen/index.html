<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stay Updated</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #67159e;
    font-family: 'Nunito', sans-serif;
  }

  .phone {
    width: 320px;
    height: 620px;
    background: #c8aef5;
    border-radius: 22px;
    box-shadow: 0 30px 80px rgba(120,60,200,0.35);
    overflow: hidden;
    display: flex;
    border: 2px solid #000000;
    flex-direction: column;
    position: relative;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 22px 6px;
    font-size: 12px;
    font-weight: 800;
    color: #222;
  }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .status-icons span { font-size: 11px; }

  /* Hero text area */
  .hero {
    padding: 10px 22px 18px;
  }

  .hero h1 {
    font-size: 34px;
    font-weight: 900;
    color: white;
    line-height: 1.15;
    text-shadow: 2px 2px 0 #7c3aed, -1px -1px 0 #7c3aed;
    letter-spacing: -0.5px;
  }

  .hero .arrow-line {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: white;
    font-size: 15px;
    font-weight: 800;
    margin-bottom: 2px;
  }
  .arrow-line .dots {
    letter-spacing: 2px;
    font-size: 13px;
    color: #f0e0ff;
  }

  .badge {
    display: inline-block;background: #5b8cde;color: white;font-size: 26px;font-weight: 900;
    padding: 10px 20px;
    border-radius: 50px;
    margin-top: 6px;
    box-shadow: 0 4px 16px rgba(60,100,200,0.3);
    letter-spacing: -0.5px;
  }

  /* Image area */
  .illustration {
    flex: 1;
    background: linear-gradient(180deg, #b5d4f7 0%, #7bb3f0 40%, #4a7fc1 100%);
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
  }

  /* Ground */
  .ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 60px;
    background: #2c5f8a;
    clip-path: polygon(0 50%, 8% 20%, 18% 45%, 30% 10%, 42% 40%, 55% 5%, 68% 35%,
     80% 15%, 92% 40%, 100% 20%, 100% 100%, 0 100%);
  }

  /* Confetti dots */
  .confetti { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .c { position: absolute; border-radius: 2px; animation: fall 3s infinite ease-in; }
  .c:nth-child(1)  { width:8px; height:8px; background:#f9c22e; top:5%;  left:12%; animation-delay:0s; }
  .c:nth-child(2)  { width:6px; height:6px; background:#e85d9a; top:10%; left:70%; animation-delay:0.5s; }
  .c:nth-child(3)  { width:10px;height:5px; background:#5bc4f5; top:3%;  left:45%; animation-delay:1s; }
  .c:nth-child(4)  { width:7px; height:7px; background:#f9c22e; top:15%; left:82%; animation-delay:0.2s; }
  .c:nth-child(5)  { width:6px; height:9px; background:#e85d9a; top:20%; left:25%; animation-delay:1.5s; }
  .c:nth-child(6)  { width:8px; height:4px; background:#5bc4f5; top:8%;  left:58%; animation-delay:0.8s; }
  .c:nth-child(7)  { width:5px; height:8px; background:#f9c22e; top:25%; left:90%; animation-delay:0.3s; }
  .c:nth-child(8)  { width:9px; height:6px; background:#ff8c42; top:12%; left:38%; animation-delay:1.2s; }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity:1; }
    100% { transform: translateY(60px) rotate(180deg); opacity:0; }
  }

  /* Figures */
  .figures {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    gap: 6px;
    padding-bottom: 30px;
  }

  /* Sparkle sticks */
  .sparkle { position: relative; }
  .sparkle::before {
    content: '✦';
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    color: #ffe082;
    animation: twinkle 0.8s infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.4; transform: translateX(-50%) scale(0.8); }
    to   { opacity: 1;   transform: translateX(-50%) scale(1.2); }
  }

  /* Person SVG placeholders using CSS art */
  .person { display: flex; flex-direction: column; align-items: center; position: relative; }

  /* Person 1 - left, red jacket */
  .p1 .head { width:28px; height:28px; background:#f5c5a0; border-radius:50%; 
    position:relative; z-index:1; }
  .p1 .body { width:36px; height:48px; background:#e8453c; border-radius:6px 6px 0 0; 
    margin-top:-4px; position:relative; }
  .p1 .legs { display:flex; gap:4px; }
  .p1 .leg  { width:14px; height:36px; background:#f0c040; border-radius:0 0 4px 4px; }
  .p1 .leg.right { transform: rotate(-15deg) translateY(-4px); }
  .p1 .arm-l { position:absolute; left:-16px; top:4px; width:16px; height:10px; 
    background:#e8453c; border-radius:8px; transform:rotate(30deg); }
  .p1 .arm-r { position:absolute; right:-14px; top:8px; width:16px; height:10px; 
    background:#e8453c; border-radius:8px; transform:rotate(-20deg); }

  /* Person 2 - center, white top */
  .p2 { transform: translateY(-10px); }
  .p2 .head { width:30px; height:30px; background:#f5c5a0; border-radius:50%; }
  .p2 .hat  { width:30px; height:14px; background:#f9c22e; 
    clip-path:polygon(50% 0%,100% 100%,0 100%); position:absolute; top:-12px; }
  .p2 .body { width:38px; height:50px; background:#f0f0f0; 
    border-radius:6px 6px 0 0; margin-top:-4px; position:relative; }
  .p2 .legs { display:flex; gap:4px; }
  .p2 .leg  { width:15px; height:38px; background:#f0c040; 
    border-radius:0 0 4px 4px; }
  .p2 .leg.left  { transform: rotate(10deg) translateY(-4px); }
  .p2 .leg.right { transform: rotate(-10deg) translateY(-4px); }
  .p2 .arm-l { position:absolute; left:-18px; top:0px; width:18px; height:10px;
  background:#f0f0f0; border-radius:8px; transform:rotate(-40deg); }
  .p2 .arm-r { position:absolute; right:-16px; top:0px; width:18px; height:10px;
     background:#f0f0f0; border-radius:8px; transform:rotate(40deg); }

  /* Person 3 - right, blue jacket */
  .p3 .head { width:28px; height:28px; background:#c8956a; 
    border-radius:50%; }
  .p3 .body { width:36px; height:46px; background:#4a7fc1; 
    border-radius:6px 6px 0 0; margin-top:-4px; position:relative; }
  .p3 .legs { display:flex; gap:4px; }
  .p3 .leg  { width:14px; height:36px; background:#f0c040; 
    border-radius:0 0 4px 4px; }
  .p3 .leg.left { transform: rotate(15deg) translateY(-4px); }
  .p3 .arm-l { position:absolute; left:-14px; top:6px; width:16px; height:10px;
    background:#4a7fc1; border-radius:8px; transform:rotate(20deg); }
  .p3 .arm-r { position:absolute; right:-16px; top:2px; width:16px;
    height:10px; background:#4a7fc1; border-radius:8px; transform:rotate(-35deg); }

  /* Bottle/glass accents */
  .bottle { width:8px; height:20px; background:#c5e87a;
     border-radius:3px; position:absolute; bottom:36px; left:-12px; }
  .glass  { width:10px; height:16px; background:rgba(200,230,255,0.8); 
    border-radius:2px; border:2px solid #aaddff; position:absolute; bottom:38px; right:-14px; }

  /* Bottom CTA */
  .cta {
    background: #c8aef5;
    padding: 16px 24px 28px;
    display: flex;
    justify-content: center;
  }

  .btn {
    background: #f5a8c8;
    color: #222;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 900;
    padding: 14px 0;
    width: 100%;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 18px rgba(200,80,130,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(200,80,130,0.4);
  }
  .btn:active { transform: translateY(0); }
</style>
</head>
<body>

<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span>9:40 PM</span>
    <div class="status-icons">
      <span>.ıl</span>
      <span>WiFi</span>
    </div>
  </div>

  <!-- Hero Text -->
  <div class="hero">
    <div class="arrow-line">
      <span>Stay</span>
      <span class="dots">- - - - - - - →</span>
    </div>
    <h1>Updated in</h1>
    <div class="badge">Real Time</div>
  </div>

  <!-- Illustration -->
  <div class="illustration">
    <div class="confetti">
      <div class="c"></div><div class="c"></div><div class="c"></div>
      <div class="c"></div><div class="c"></div><div class="c"></div>
      <div class="c"></div><div class="c"></div>
    </div>

    <div class="figures">
      <!-- Person 1 -->
      <div class="person p1 sparkle">
        <div class="head"></div>
        <div class="body">
          <div class="arm-l"></div>
          <div class="arm-r"></div>
          <div class="bottle"></div>
        </div>
        <div class="legs">
          <div class="leg left"></div>
          <div class="leg right"></div>
        </div>
      </div>

      <!-- Person 2 (center, taller) -->
      <div class="person p2 sparkle">
        <div style="position:relative;">
          <div class="hat"></div>
          <div class="head"></div>
        </div>
        <div class="body">
          <div class="arm-l"></div>
          <div class="arm-r"></div>
        </div>
        <div class="legs">
          <div class="leg left"></div>
          <div class="leg right"></div>
        </div>
      </div>

      <!-- Person 3 -->
      <div class="person p3 sparkle">
        <div class="head"></div>
        <div class="body">
          <div class="arm-l"></div>
          <div class="arm-r"></div>
          <div class="glass"></div>
        </div>
        <div class="legs">
          <div class="leg left"></div>
          <div class="leg right"></div>
        </div>
      </div>
    </div>

    <div class="ground"></div>
  </div>

  <!-- CTA Button -->
  <div class="cta">
    <button class="btn">Get Started</button>
  </div>
</div>

</body>
</html>
