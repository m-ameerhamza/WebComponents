<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up Page</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="card">
    <!-- Left Panel -->
    <div class="panel-left">
      <div class="landscape"></div>
      <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="panel-right">
      <h1>Sign Up</h1>
      <p class="sub">Already have an account? <a href="#">Log in</a></p>

      <div class="row">
        <div class="input-wrap">
          <input type="text" placeholder="First Name" />
        </div>
        <div class="input-wrap">
          <input type="text" placeholder="Last Name" />
        </div>
      </div>

      <div class="input-wrap">
        <input type="email" placeholder="Email" />
      </div>

      <div class="input-wrap password-wrap">
        <input type="password" id="pwd" placeholder="Enter your password" />
        <button class="eye-btn" onclick="togglePwd()" aria-label="Toggle password">
          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.522 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.478 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>

      <label class="checkbox-label">
        <input type="checkbox" />
        <span class="checkmark"></span>
        I agree to the <a href="#">terms &amp; conditions</a>
      </label>

      <button class="btn-primary">Create account</button>

      <div class="divider"><span>Or register with</span></div>

      <div class="social-row">
        <button class="btn-social">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" alt="Google"/> Google
        </button>
        <button class="btn-social">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Apple
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
