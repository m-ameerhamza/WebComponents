<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post UI</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #f5f5f5;
  }

  .card {
    width: 300px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    overflow: hidden;
  }

  .header {
    display: flex;
    align-items: center;
    padding: 10px;
  }

  .avatar {
    width: 40px;
    height: 40px;
    background-color: #ccc;
    border-radius: 50%;
    margin-right: 10px;
  }

  .line {
    flex-grow: 1;
    height: 10px;
    background-color: #ccc;
    border-radius: 5px;
  }

  .image {
    background-color: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 200px;
    font-size: 24px;
    font-weight: bold;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
  }

  .icons {
    display: flex;
    gap: 10px;
  }

  .icon-button {
    width: 24px;
    height: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }

  .icon-button svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: black;
    stroke-width: 2;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="avatar"></div>
    <div class="line"></div>
  </div>

  <div class="image">
    Post.
  </div>

  <div class="footer">
    <div class="icons">
      <span class="icon-button" aria-label="Like">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 6.5 3.5 5 5.5 5c1.54 0 3.04.99 3.57 2.36h1.87C15.46 5.99 16.96 5 18.5 5 20.5 5 22 6.5 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>
        </svg>
      </span>
      <span class="icon-button" aria-label="Comment">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 11.5a8.38 8.38 0 0 1-9 8.5 8.38 8.38 0 0 1-4.5-1.2L3 20l1.7-4.3A8.38 8.38 0 0 1 3 11.5 8.5 8.5 0 0 1 11.5 3 8.5 8.5 0 0 1 21 11.5z"></path>
        </svg>
      </span>
      <span class="icon-button" aria-label="Share">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18 8.59l-4.95-4.95a1 1 0 0 0-1.41 0L7 8.59M12 3v12m6-6h-4m-4 0H6"></path>
        </svg>
      </span>
    </div>
    <span class="icon-button" aria-label="Save">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2zM12 17l-5-5h3V7h4v5h3l-5 5z"></path>
      </svg>
    </span>
  </div>
</div>

</body>
</html>
