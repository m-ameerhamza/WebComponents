<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Graph UI</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrapper">
  <div class="card-back"></div>
  <div class="card">
    <div class="top">
      <div>
        <h2 class="title">Electricity Usage</h2>
        <div class="amount">
          <span>$</span>1099
        </div>
      </div>
      <button class="btn">View Report</button>
    </div>
    <div class="chart">
      <div class="y-axis">
        <div>$ 500</div>
        <div>$ 400</div>
        <div>$ 300</div>
        <div>$ 200</div>
        <div>$ 100</div>
        <div>$ 0</div>
      </div>
      <div class="graph">
        <div class="grid"></div>
        <div class="grid"></div>
        <div class="grid"></div>
        <div class="grid"></div>
        <div class="bars">
          <div class="bar-wrap">
            <div class="value"></div>
            <div class="bar" style="height:100px"></div>
            <div class="month">Jan</div>
          </div>
          <div class="bar-wrap">
            <div class="value"></div>
            <div class="bar" style="height:190px"></div>
            <div class="month">Feb</div>
          </div>
          <div class="bar-wrap">
            <div class="value">280 Units</div>
            <div class="bar active" style="height:250px"></div>
            <div class="month">Mar</div>
          </div>
          <div class="bar-wrap">
            <div class="value"></div>
            <div class="bar" style="height:190px"></div>
            <div class="month">Apr</div>
          </div>
          <div class="bar-wrap">
            <div class="value"></div>
            <div class="bar" style="height:100px"></div>
            <div class="month">May</div>
          </div>
          <div class="bar-wrap">
            <div class="value"></div>
            <div class="bar" style="height:45px"></div>
            <div class="month">Jun</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
