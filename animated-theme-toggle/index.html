<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Theme Toggle</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="toggle-wrapper">
    <input class="baw" type="checkbox" id="toggle"/>
    <label class="theme-toggle" for="toggle">
      <!-- DAY -->
      <div class="scene day">
        <div class="day-rings"></div>

        <div class="sun"></div>

        <div class="cloud big"></div>
        <div class="cloud small"></div>
      </div>
      <!-- NIGHT -->
       <div class="scene night"><div class="night-rings"></div> <div class="moon">
          <div class="crater c1"></div>
          <div class="crater c2"></div>
          <div class="crater c3"></div>
        </div><div class="star s1"></div><div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div><div class="star diamond d1"></div>
        <div class="star diamond d2"></div>
        <div class="star diamond d3"></div>
      </div></label>
</div>
  <script src="script.js"></script>
</body>
</html>
